  <!-- 聊天窗口 -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <h3>博客AI助手</h3>
      <button onclick="toggleChat()">×</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="输入问题..." onkeyup="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>
  <!-- 聊天按钮 -->
  <button class="chat-toggle" onclick="toggleChat()">💬</button>

  <script>
    // 切换聊天窗口显示/隐藏
    function toggleChat() {
      const chatWindow = document.getElementById('chatWindow');
      chatWindow.classList.toggle('open');
    }

    // 发送消息
    async function sendMessage() {
      const userInput = document.getElementById('userInput');
      const message = userInput.value.trim();
      if (!message) return;

      // 显示用户消息
      addMessage('user', message);
      userInput.value = '';

      // 调用DeepSeek API获取回复
      const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'sk-0fd0b4287ac44ec88fab46e87df9e428' // 替换为你的API Key
        },
        body: JSON.stringify({
          model: 'deepseek-chat', // 使用DeepSeek-V3模型
          messages: [{ role: 'user', content: message }],
          temperature: 0.7 // 控制生成随机性（0.1-1.0）
        })
      });

      const data = await response.json();
      const aiResponse = data.choices[0].message.content;

      // 显示AI回复
      addMessage('assistant', aiResponse);
    }

    // 添加消息到聊天窗口
    function addMessage(role, content) {
      const chatMessages = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'bubble';
      bubbleDiv.textContent = content;
      messageDiv.appendChild(bubbleDiv);
      chatMessages.appendChild(messageDiv);
      // 滚动到底部
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  </script>
